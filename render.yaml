services:
  - type: web
    name: portfolio-site
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_CESIUM_ION_TOKEN
        sync: false
      - key: VITE_DEMO_MODE
        value: "true"
      - key: VITE_WEB3FORMS_ACCESS_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: portfolio-api
    runtime: node
    rootDir: apps/server
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: NODE_ENV=production npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: WEB3FORMS_ACCESS_KEY
        sync: false
